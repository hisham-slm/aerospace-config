# ========================================
# === BASIC SETTINGS ===
# ========================================

after-startup-command = [
  """exec-and-forget bash -lc '
    aerospace workspace 1; open -n -a kitty; sleep 0.3; open -n -a kitty; sleep 0.8;
    aerospace workspace 2; open -n -a "Brave Browser"; sleep 0.8;
    aerospace workspace 4; open -n -a postman; sleep 0.8;
    aerospace workspace 5; open -n -a spotify; sleep 0.8;
    aerospace workspace 10; open -n -a kitty; sleep 0.3; open -n -a kitty; sleep 0.3; open -n -a kitty; sleep 0.8;
    aerospace workspace 1;
  '"""
]

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=0'
]

# Start AeroSpace at login
start-at-login = true

# Layout behavior
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

# Mouse follows focus when monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

# ========================================
# === WINDOW RULES ===
# ========================================

# Default: everything tiled (no filter means "all apps")
[[on-window-detected]]
run = 'layout tiling'

# Floating exceptions
[[on-window-detected]]
if.app-name-regex-substring = 'Finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Telegram'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Discord'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'QuickTime'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Camera'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Elgato'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Mail'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Trello'
run = 'layout floating'

# ========================================
# === KEYBOARD & INPUT ===
# ========================================

[key-mapping]
preset = 'qwerty'

# Gaps
[gaps]
inner.horizontal = 20
inner.vertical = 20
outer.left = 20
outer.bottom = 20
outer.top = 10
outer.right = 20

# ========================================
# === MAIN MODE ===
# ========================================

[mode.main.binding]

# Launch apps
alt-enter = 'exec-and-forget open -n -a kitty'
alt-b = 'exec-and-forget open -n -a "Brave Browser"'
alt-t = 'exec-and-forget open -a /Applications/Telegram.app'
alt-a = 'exec-and-forget open -a /Applications/Arc.app'
alt-o = 'exec-and-forget open -a /Applications/Obsidian.app'
alt-c = 'exec-and-forget open -a /Applications/Claude.app'
alt-q = 'exec-and-forget open -a /System/Applications/QuickTime Player.app'

# Window management
alt-space = 'layout floating tiling'
alt-ctrl-shift-f = 'fullscreen'
alt-ctrl-f = 'layout floating tiling'

# Focus movement
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Quit frontmost app (cmd-k)
cmd-k = 'close'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Workspaces 1–9
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move to workspace
alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'

# Layout switching
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Workspace navigation
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Modes
alt-shift-semicolon = 'mode service'
alt-shift-enter = 'mode apps'

# Reload config
alt-shift-r = 'reload-config'

# ========================================
# === SERVICE MODE ===
# ========================================

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# ========================================
# === APPS MODE ===
# ========================================

[mode.apps.binding]
alt-w = ['exec-and-forget open -a /Applications/WezTerm.app', 'mode main']

# ========================================
# === WORKSPACE-TO-MONITOR ASSIGNMENTS ===
# ========================================

[workspace-to-monitor-force-assignment]
1 = '^Built-in.*$'
2 = '^DELL U.*$'
3 = '^DELL S.*$'
